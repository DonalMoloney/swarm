<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swarm Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(circle at 50% -20%, #11203f 0%, #0a0d14 55%) fixed;
    color: #e6edf3;
    font-family: 'SF Mono', 'Cascadia Code', monospace;
    font-size: 12px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid #1f6feb22;
    background: #0f1623cc;
    backdrop-filter: blur(6px);
    flex-shrink: 0;
  }

  header h1 { font-size: 13px; color: #7cc0ff; text-shadow: 0 0 10px #58a6ff66; }
  header .meta { color: #8b949e; font-size: 11px; }

  #status-badge {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    background: #21262d;
    color: #8b949e;
    transition: background 0.2s, box-shadow 0.2s, color 0.2s;
  }
  #status-badge.running { background: #1f6feb33; color: #7cc0ff; box-shadow: 0 0 12px #1f6feb66; }
  #status-badge.done    { background: #23863633; color: #56d364; box-shadow: 0 0 12px #23863655; }
  #status-badge.error   { background: #f8514922; color: #f85149; box-shadow: 0 0 12px #f8514944; }
  #status-badge.running::before { content: '● '; animation: pulse 1.2s ease-in-out infinite; }

  /* Top: topology graph */
  #graph-panel {
    flex: 0 0 auto;
    border-bottom: 1px solid #1f6feb22;
    padding: 8px 12px;
    background: transparent;
    position: relative;
  }

  #graph-panel h2 { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

  #graph-svg {
    width: 100%;
    height: 120px;
    display: block;
    cursor: grab;
    user-select: none;
  }
  #graph-svg.dragging { cursor: grabbing; }

  /* Zoom controls — shown only when the topology has multiple nodes */
  #graph-zoom {
    position: absolute;
    top: 8px;
    right: 12px;
    display: none;
    align-items: center;
    gap: 4px;
    z-index: 5;
    background: #0f1623cc;
    backdrop-filter: blur(6px);
    border: 1px solid #1f6feb33;
    border-radius: 6px;
    padding: 2px 4px;
  }
  #graph-zoom button {
    width: 20px;
    height: 20px;
    background: #1c2433;
    border: 1px solid #2a3346;
    color: #9ecbff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }
  #graph-zoom button:hover { border-color: #58a6ff66; color: #cfe3ff; }
  #graph-zoom-label { color: #8b949e; font-size: 10px; min-width: 34px; text-align: center; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .pulse { animation: pulse 1.2s ease-in-out infinite; }

  /* Marching dashes on live topology edges */
  @keyframes flow { to { stroke-dashoffset: -20; } }
  .edge-live {
    stroke-dasharray: 6 4;
    animation: flow 0.6s linear infinite;
  }

  /* Bottom: task tree + logs side by side */
  #bottom {
    display: grid;
    grid-template-columns: 280px 1fr;
    flex: 1;
    overflow: hidden;
  }

  #task-panel {
    border-right: 1px solid #1f6feb22;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #task-panel h2, #log-panel h2 {
    font-size: 10px;
    color: #484f58;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 12px 6px;
    border-bottom: 1px solid #21262d;
    flex-shrink: 0;
  }

  #task-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 12px;
    border-bottom: 1px solid #21262d11;
    transition: background 0.15s;
  }

  .task-item:hover { background: #161b22; }

  .task-icon { flex-shrink: 0; width: 14px; text-align: center; margin-top: 1px; }
  .task-icon.pending  { color: #484f58; }
  .task-icon.running  { color: #58a6ff; text-shadow: 0 0 8px #58a6ff; }
  .task-icon.done     { color: #3fb950; text-shadow: 0 0 8px #3fb95099; }
  .task-icon.error    { color: #f85149; text-shadow: 0 0 8px #f8514999; }

  .task-body { flex: 1; min-width: 0; }
  .task-name { color: #e6edf3; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-name.pending { color: #484f58; }
  .task-meta { color: #8b949e; font-size: 10px; margin-top: 2px; }
  .task-output {
    color: #8b949e;
    font-size: 10px;
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }

  /* Log panel */
  #log-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: transparent;
  }

  #log-stream {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    line-height: 1.6;
  }

  .log-line {
    display: flex;
    gap: 8px;
    margin-bottom: 1px;
  }

  .log-ts { color: #484f58; flex-shrink: 0; }
  .log-agent { flex-shrink: 0; min-width: 80px; font-weight: 600; }
  .log-msg { color: #8b949e; word-break: break-word; }

  .log-line.swarm_start .log-agent, .log-line.swarm_done .log-agent { color: #a371f7; }
  .log-line.agent_start .log-agent  { color: #58a6ff; }
  .log-line.agent_done  .log-agent  { color: #3fb950; }
  .log-line.agent_error .log-agent  { color: #f85149; }
  .log-line.agent_log   .log-agent  { color: #d29922; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  #empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #484f58;
    font-size: 11px;
  }

  .tab { background:#1c2433; border:1px solid #2a3346; color:#8b949e; padding:3px 10px; border-radius:4px; cursor:pointer; font-family:inherit; font-size:11px; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .tab:hover { color:#9ecbff; border-color:#58a6ff44; }
  .tab.active { background:linear-gradient(#1f6feb44,#1f6feb22); color:#9ecbff; border-color:#58a6ff66; }
  #history-panel { display:none; flex:1; overflow:auto; padding:12px 16px; }
  #history-panel.visible { display:block; }
  #history-table { width:100%; border-collapse:collapse; }
  #history-table th { color:#484f58; font-size:10px; text-transform:uppercase; letter-spacing:1px; padding:4px 8px; border-bottom:1px solid #21262d; text-align:left; }
  #history-table td { padding:5px 8px; border-bottom:1px solid #161b22; color:#8b949e; font-size:11px; }
  #history-table td:first-child { color:#e6edf3; }
  #history-output { margin-top:12px; background:#161b22; border:1px solid #21262d; border-radius:4px; padding:12px; white-space:pre-wrap; color:#8b949e; font-size:11px; display:none; }
</style>
</head>
<body>

<header>
  <h1 id="swarm-title">⬡ Swarm Dashboard</h1>
    <nav id="tabs" style="display:flex;gap:4px;">
      <button id="tab-live"      class="tab active" onclick="showTab('live')">Live</button>
      <button id="tab-history"   class="tab"        onclick="showTab('history')">History</button>
      <button id="tab-decompose" class="tab"        onclick="showTab('decompose')">Decompose</button>
    </nav>
  <span class="meta" id="swarm-meta">waiting for swarm…</span>
  <span id="status-badge">idle</span>
</header>

<div id="graph-panel">
  <h2>Topology</h2>
  <div id="graph-zoom">
    <button onclick="graphZoom.zoomOut()" title="Zoom out">−</button>
    <span id="graph-zoom-label">100%</span>
    <button onclick="graphZoom.zoomIn()" title="Zoom in">+</button>
    <button onclick="graphZoom.reset()" title="Reset view">⤢</button>
  </div>
  <svg id="graph-svg"></svg>
</div>

<div id="bottom">
  <div id="task-panel">
    <h2>Agents</h2>
    <div id="task-list">
      <div id="empty-state">No agents yet</div>
    </div>
  </div>

  <div id="log-panel">
    <h2>Live Log</h2>
    <div id="log-stream"></div>
  </div>
</div>

<div id="history-panel">
  <h2 style="font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Run History</h2>
  <table id="history-table">
    <thead><tr><th>ID</th><th>Blueprint</th><th>Task</th><th>Date</th></tr></thead>
    <tbody id="history-body"></tbody>
  </table>
  <pre id="history-output"></pre>
</div>

<div id="decompose-panel" style="display:none;flex:1;overflow:auto;padding:12px 16px;">
  <h2 style="font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Decomposition Runs</h2>
  <div id="decompose-list"></div>
</div>

<script src="graph.js"></script>
<script>
  const state = {
    swarmName: '',
    task: '',
    stages: [],
    agents: {},   // name → { status, tokens, elapsed, output, startedAt }
    status: 'idle',
  };

  const AGENT_COLORS = ['#58a6ff','#3fb950','#d29922','#a371f7','#f0883e','#39d353','#f85149'];
  const agentColorMap = {};
  let colorIdx = 0;

  function agentColor(name) {
    if (!agentColorMap[name]) {
      agentColorMap[name] = AGENT_COLORS[colorIdx++ % AGENT_COLORS.length];
    }
    return agentColorMap[name];
  }

  function fmtTime(ms) {
    if (ms < 1000) return `${ms}ms`;
    return `${(ms / 1000).toFixed(1)}s`;
  }

  function statusIcon(s) {
    return { pending: '○', running: '⟳', done: '✓', error: '✗' }[s] || '○';
  }

  function updateHeader() {
    const title = document.getElementById('swarm-title');
    const meta = document.getElementById('swarm-meta');
    const badge = document.getElementById('status-badge');

    const name = state.swarmName ? `⬡ ${state.swarmName}` : '⬡ Swarm Dashboard';
    title.textContent = name;
    meta.textContent = state.task || 'waiting for swarm…';

    badge.textContent = state.status;
    badge.className = '';
    if (state.status === 'running') badge.classList.add('running');
    if (state.status === 'done') badge.classList.add('done');
    if (state.status === 'error') badge.classList.add('error');
  }

  function renderTaskList() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-state');
    const names = Object.keys(state.agents);

    if (!names.length) {
      if (empty) empty.style.display = 'flex';
      return;
    }
    if (empty) empty.style.display = 'none';

    list.textContent = '';

    names.forEach(name => {
      const a = state.agents[name];
      const item = document.createElement('div');
      item.className = 'task-item';

      const icon = document.createElement('div');
      icon.className = `task-icon ${a.status}`;
      icon.textContent = statusIcon(a.status);

      const body = document.createElement('div');
      body.className = 'task-body';

      const nameEl = document.createElement('div');
      nameEl.className = `task-name ${a.status === 'pending' ? 'pending' : ''}`;
      nameEl.textContent = name;

      const metaEl = document.createElement('div');
      metaEl.className = 'task-meta';
      const parts = [];
      if (a.elapsed) parts.push(fmtTime(a.elapsed));
      if (a.tokens) parts.push(`${a.tokens.toLocaleString()} tok`);
      metaEl.textContent = parts.join(' · ') || a.status;

      body.appendChild(nameEl);
      body.appendChild(metaEl);

      if (a.output) {
        const out = document.createElement('div');
        out.className = 'task-output';
        out.textContent = a.output;
        body.appendChild(out);
      }

      item.appendChild(icon);
      item.appendChild(body);
      list.appendChild(item);
    });
  }

  function appendLog(event) {
    const stream = document.getElementById('log-stream');
    const line = document.createElement('div');
    line.className = `log-line ${event.type}`;

    const ts = document.createElement('span');
    ts.className = 'log-ts';
    ts.textContent = new Date(event.ts).toLocaleTimeString('en', { hour12: false });

    const agent = document.createElement('span');
    agent.className = 'log-agent';
    const agentLabel = event.agent || 'swarm';
    agent.textContent = `[${agentLabel}]`;
    agent.style.color = agentColor(agentLabel);

    const msg = document.createElement('span');
    msg.className = 'log-msg';
    msg.textContent = event.message || event.status || event.type;

    line.appendChild(ts);
    line.appendChild(agent);
    line.appendChild(msg);
    stream.appendChild(line);
    stream.scrollTop = stream.scrollHeight;
  }

  function processEvent(event) {
    switch (event.type) {
      case 'swarm_start':
        state.swarmName = event.agent || 'swarm';
        state.task = event.message || '';
        state.status = 'running';
        if (event.stages) state.stages = event.stages;
        // Register all agents as pending
        if (event.agents) {
          event.agents.forEach(name => {
            state.agents[name] = { status: 'pending', tokens: 0, elapsed: 0 };
          });
        }
        break;

      case 'agent_start':
        if (event.agent) {
          state.agents[event.agent] = {
            ...(state.agents[event.agent] || {}),
            status: 'running',
            startedAt: event.ts,
          };
        }
        break;

      case 'agent_log':
        if (event.agent && state.agents[event.agent]) {
          state.agents[event.agent].output = event.message;
        }
        break;

      case 'agent_done':
        if (event.agent && state.agents[event.agent]) {
          const a = state.agents[event.agent];
          a.status = 'done';
          a.elapsed = a.startedAt ? event.ts - a.startedAt : 0;
          a.tokens = event.tokens || 0;
          a.output = event.message || '';
        }
        break;

      case 'agent_error':
        if (event.agent && state.agents[event.agent]) {
          state.agents[event.agent].status = 'error';
          state.agents[event.agent].output = event.message;
        }
        break;

      case 'swarm_done':
        state.status = event.status === 'error' ? 'error' : 'done';
        break;
    }

    updateHeader();
    renderTaskList();

    const agentStates = {};
    Object.entries(state.agents).forEach(([k, v]) => { agentStates[k] = v.status; });
    renderGraph(state.stages, agentStates, document.getElementById('graph-svg'));

    appendLog(event);
  }

  // Connect SSE
  function connect() {
    const es = new EventSource('/events');
    es.onmessage = e => {
      try { processEvent(JSON.parse(e.data)); } catch {}
    };
    es.onerror = () => {
      es.close();
      setTimeout(connect, 2000);
    };
  }

  connect();

  function showTab(tab) {
    ['live', 'history', 'decompose'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
    document.getElementById('bottom').style.display = tab === 'live' ? 'grid' : 'none';
    document.getElementById('history-panel').style.display = tab === 'history' ? 'block' : 'none';
    document.getElementById('decompose-panel').style.display = tab === 'decompose' ? 'block' : 'none';
    if (tab === 'history') loadHistory();
    if (tab === 'decompose') loadDecompose();
  }

  function loadHistory() {
    fetch('/history')
      .then(r => r.json())
      .then(records => {
        const tbody = document.getElementById('history-body');
        while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
        if (!records.length) {
          const tr = document.createElement('tr');
          const td = document.createElement('td');
          td.colSpan = 4;
          td.textContent = 'No runs yet';
          td.style.cssText = 'color:#484f58;text-align:center;padding:20px';
          tr.appendChild(td);
          tbody.appendChild(tr);
          return;
        }
        records.forEach(r => {
          const tr = document.createElement('tr');
          tr.style.cursor = 'pointer';
          tr.addEventListener('click', () => openRun(r.file, r.id));
          [
            r.id,
            r.blueprint,
            r.task.length > 60 ? r.task.slice(0, 60) + '…' : r.task,
            new Date(r.ts).toLocaleString(),
          ].forEach(text => {
            const td = document.createElement('td');
            td.textContent = text;
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      });
  }

  function loadDecompose() {
    fetch('/history')
      .then(r => r.json())
      .then(records => {
        const runs = records.filter(r => r.blueprint === 'decompose');
        const container = document.getElementById('decompose-list');
        while (container.firstChild) container.removeChild(container.firstChild);

        if (!runs.length) {
          const msg = document.createElement('p');
          msg.textContent = 'No decomposition runs yet. Use /swarm decompose "<goal>" to start one.';
          msg.style.color = '#484f58';
          container.appendChild(msg);
          return;
        }

        runs.forEach(r => {
          const section = document.createElement('div');
          section.style.cssText = 'border:1px solid #21262d;border-radius:4px;margin-bottom:12px;overflow:hidden;';

          const header = document.createElement('div');
          header.style.cssText = 'background:#161b22;padding:8px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;';

          const title = document.createElement('span');
          title.style.color = '#e6edf3';
          title.textContent = r.task;

          const meta = document.createElement('span');
          meta.style.color = '#484f58';
          meta.style.fontSize = '10px';
          meta.textContent = new Date(r.ts).toLocaleString();

          header.appendChild(title);
          header.appendChild(meta);

          const body = document.createElement('pre');
          body.style.cssText = 'display:none;padding:12px;font-size:11px;color:#8b949e;white-space:pre-wrap;margin:0;';

          header.addEventListener('click', () => {
            if (body.style.display === 'none') {
              fetch('/output/' + encodeURIComponent(r.file))
                .then(res => res.ok ? res.text() : Promise.reject())
                .then(text => { body.textContent = text; body.style.display = 'block'; })
                .catch(() => { body.textContent = 'Output file not found.'; body.style.display = 'block'; });
            } else {
              body.style.display = 'none';
            }
          });

          section.appendChild(header);
          section.appendChild(body);
          container.appendChild(section);
        });
      });
  }

  function openRun(file, id) {
    fetch('/output/' + encodeURIComponent(file))
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(text => {
        const el = document.getElementById('history-output');
        el.textContent = text;
        el.style.display = 'block';
      })
      .catch(() => {
        const el = document.getElementById('history-output');
        el.textContent = 'Output file not found: ' + file;
        el.style.display = 'block';
      });
  }
</script>
</body>
</html>
