<!-- wizard.html: Interactive multi-step blueprint creation wizard -->

<div id="wizard-container" style="display:flex;flex-direction:column;height:100%;background:#0d1117;color:#e6edf3;font-family:'SF Mono','Cascadia Code',monospace;font-size:12px;">

  <header style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #21262d;background:#161b22;flex-shrink:0;">
    <div>
      <h1 id="wizard-title" style="font-size:13px;color:#58a6ff;margin:0;">New Blueprint</h1>
      <p id="wizard-subtitle" class="subtitle" style="color:#8b949e;font-size:11px;margin:4px 0 0;"></p>
    </div>
    <span id="wizard-counter" style="padding:4px 10px;border-radius:6px;background:#21262d;color:#8b949e;font-size:11px;">Step 1 of 6</span>
  </header>

  <!-- Step Content Area -->
  <div id="wizard-content" style="flex:1;overflow-y:auto;padding:16px;">
    <!-- Content dynamically inserted here -->
  </div>

  <!-- Navigation Buttons -->
  <footer style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid #21262d;background:#161b22;flex-shrink:0;">
    <button id="wizard-prev" class="mock-button" onclick="wizardPrev()" style="flex:0 1 auto;padding:8px 16px;background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;transition:all 0.15s;">
      Previous
    </button>
    <div style="flex:1;"></div>
    <button id="wizard-next" class="mock-button" onclick="wizardNext()" style="flex:0 1 auto;padding:8px 16px;background:#1f6feb;color:#e6edf3;border:1px solid #1f6feb;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;">
      Next
    </button>
  </footer>

</div>

<script>
  /**
   * Blueprint Wizard - 6-step interactive form
   */

  const STEPS = [
    {
      id: 'name',
      title: 'Blueprint Name',
      subtitle: 'Give your blueprint a concise, descriptive name',
      prompt: 'Enter blueprint name (e.g., "research", "code-review", "debug")',
      placeholder: 'my-swarm-blueprint',
      inputType: 'text',
    },
    {
      id: 'description',
      title: 'Description',
      subtitle: 'What does this blueprint do?',
      prompt: 'Describe the purpose and workflow',
      placeholder: 'Orchestrates parallel agents to...',
      inputType: 'textarea',
    },
    {
      id: 'agents',
      title: 'Define Agents',
      subtitle: 'Specify the agents involved in this blueprint',
      prompt: 'Enter agent names (comma-separated)',
      placeholder: 'agent1, agent2, agent3',
      inputType: 'text',
      hint: 'Examples: searcher, analyst, synthesizer',
    },
    {
      id: 'details',
      title: 'Agent Details',
      subtitle: 'Configure individual agent prompts',
      prompt: 'You can edit agent prompts after the wizard',
      inputType: 'info',
      hint: 'Each agent will have a dedicated prompt field',
    },
    {
      id: 'context',
      title: 'Execution Context',
      subtitle: 'Define the overall task or goal',
      prompt: 'What task will the swarm execute?',
      placeholder: 'Research the latest AI frameworks...',
      inputType: 'textarea',
    },
    {
      id: 'flow',
      title: 'Execution Flow',
      subtitle: 'Define the topology using flow syntax',
      prompt: 'Use arrow (->) for sequential, comma (,) for parallel',
      placeholder: 'agent1, agent2 -> agent3',
      inputType: 'text',
      hint: 'Examples: "A, B -> C", "A -> B -> C", "A, B, C"',
    },
  ];

  let currentStep = 0;
  const formData = {};

  function wizardNext() {
    // Validate current step
    const step = STEPS[currentStep];
    const input = document.getElementById('wizard-input');

    if (input && input.value.trim()) {
      formData[step.id] = input.value.trim();
    }

    if (currentStep < STEPS.length - 1) {
      currentStep++;
      renderStep();
    } else {
      // Finish wizard
      completeWizard();
    }
  }

  function wizardPrev() {
    if (currentStep > 0) {
      // Save current input
      const step = STEPS[currentStep];
      const input = document.getElementById('wizard-input');
      if (input && input.value.trim()) {
        formData[step.id] = input.value.trim();
      }

      currentStep--;
      renderStep();
    }
  }

  function renderStep() {
    const step = STEPS[currentStep];
    const content = document.getElementById('wizard-content');
    const counter = document.getElementById('wizard-counter');
    const title = document.getElementById('wizard-title');
    const subtitle = document.getElementById('wizard-subtitle');
    const prevBtn = document.getElementById('wizard-prev');
    const nextBtn = document.getElementById('wizard-next');

    // Update header
    title.textContent = step.title;
    subtitle.textContent = step.subtitle;
    counter.textContent = `Step ${currentStep + 1} of ${STEPS.length}`;

    // Disable/enable prev button
    prevBtn.disabled = currentStep === 0;
    prevBtn.style.opacity = currentStep === 0 ? '0.5' : '1';
    prevBtn.style.cursor = currentStep === 0 ? 'not-allowed' : 'pointer';

    // Update next button text
    nextBtn.textContent = currentStep === STEPS.length - 1 ? 'Create Blueprint' : 'Next';

    // Clear and render content
    while (content.firstChild) content.removeChild(content.firstChild);

    // Prompt label
    const promptLabel = document.createElement('label');
    promptLabel.style.cssText = 'display:block;color:#8b949e;font-size:11px;margin-bottom:8px;';
    promptLabel.textContent = step.prompt;
    content.appendChild(promptLabel);

    // Input field (or info message for steps without input)
    if (step.inputType === 'text') {
      const input = document.createElement('input');
      input.id = 'wizard-input';
      input.type = 'text';
      input.placeholder = step.placeholder || '';
      input.value = formData[step.id] || '';
      input.className = 'mock-input';
      input.style.cssText = 'display:block;width:100%;padding:10px 12px;background:#161b22;border:1px solid #21262d;border-radius:4px;color:#e6edf3;font-family:inherit;font-size:11px;margin-bottom:8px;box-sizing:border-box;';
      input.addEventListener('keypress', e => {
        if (e.key === 'Enter') wizardNext();
      });
      content.appendChild(input);
      input.focus();
    } else if (step.inputType === 'textarea') {
      const textarea = document.createElement('textarea');
      textarea.id = 'wizard-input';
      textarea.placeholder = step.placeholder || '';
      textarea.value = formData[step.id] || '';
      textarea.className = 'mock-input';
      textarea.style.cssText = 'display:block;width:100%;height:120px;padding:10px 12px;background:#161b22;border:1px solid #21262d;border-radius:4px;color:#e6edf3;font-family:inherit;font-size:11px;margin-bottom:8px;box-sizing:border-box;resize:vertical;';
      content.appendChild(textarea);
      textarea.focus();
    } else if (step.inputType === 'info') {
      const infoBox = document.createElement('div');
      infoBox.style.cssText = 'background:#161b22;border:1px solid #21262d;border-radius:4px;padding:12px;margin-bottom:8px;color:#8b949e;font-size:11px;line-height:1.6;';
      infoBox.textContent = step.hint || 'Configuration information will be gathered in the next steps.';
      content.appendChild(infoBox);
    }

    // Hint text
    if (step.hint) {
      const hint = document.createElement('p');
      hint.style.cssText = 'font-size:10px;color:#484f58;margin-top:8px;margin-bottom:0;';
      hint.textContent = step.hint;
      content.appendChild(hint);
    }
  }

  function completeWizard() {
    console.log('Blueprint wizard complete:', formData);

    // In real integration: POST to /blueprints or trigger creation
    if (window.parent && window.parent.postMessage) {
      window.parent.postMessage({
        type: 'wizard_complete',
        blueprint: formData,
      }, '*');
    }

    // Show success message
    const content = document.getElementById('wizard-content');
    while (content.firstChild) content.removeChild(content.firstChild);

    const success = document.createElement('div');
    success.style.cssText = 'text-align:center;padding:40px 20px;';

    const icon = document.createElement('div');
    icon.style.cssText = 'font-size:48px;margin-bottom:16px;';
    icon.textContent = '✓';

    const msg = document.createElement('h2');
    msg.style.cssText = 'color:#3fb950;font-size:13px;margin:0 0 8px;font-weight:500;';
    msg.textContent = 'Blueprint Created!';

    const detail = document.createElement('p');
    detail.style.cssText = 'color:#8b949e;font-size:11px;margin:0;';
    detail.textContent = 'Your blueprint "' + (formData.name || 'untitled') + '" is ready to use.';

    success.appendChild(icon);
    success.appendChild(msg);
    success.appendChild(detail);
    content.appendChild(success);

    // Hide navigation
    document.getElementById('wizard-prev').style.display = 'none';
    document.getElementById('wizard-next').style.display = 'none';
  }

  // Initialize
  renderStep();
</script>
