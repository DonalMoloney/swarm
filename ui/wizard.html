<!-- wizard.html: Interactive multi-step blueprint creation wizard -->

<style>
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  @keyframes checkmark {
    0% { transform: scale(0.8) rotate(-45deg); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1) rotate(0deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  #wizard-progress-bar {
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  #wizard-title {
    transition: color 0.2s ease;
  }

  #wizard-content {
    animation: fadeIn 0.3s ease-out;
  }

  #wizard-input {
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  #wizard-input:focus {
    border-color: #1f6feb;
    box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.1);
    outline: none;
  }

  .wizard-button:hover:not(:disabled) {
    filter: brightness(1.1);
    transform: translateY(-1px);
  }

  .wizard-button:active:not(:disabled) {
    transform: translateY(0);
  }

  .wizard-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #wizard-success-icon {
    animation: pulse 1s ease-in-out;
  }
</style>

<div id="wizard-container" style="display:flex;flex-direction:column;height:100%;background:#0d1117;color:#e6edf3;font-family:'SF Mono','Cascadia Code',monospace;font-size:12px;">

  <header style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #21262d;background:#161b22;flex-shrink:0;flex-wrap:wrap;gap:12px;">
    <div style="flex:1;min-width:0;">
      <h1 id="wizard-title" style="font-size:18px;font-weight:600;color:#58a6ff;margin:0;">New Blueprint</h1>
      <p id="wizard-subtitle" style="color:#8b949e;font-size:12px;margin:4px 0 0;line-height:1.4;"></p>
    </div>
    <div id="wizard-progress" style="flex:1;min-width:200px;display:flex;align-items:center;gap:8px;">
      <div style="flex:1;height:4px;background:#21262d;border-radius:2px;overflow:hidden;">
        <div id="wizard-progress-bar" style="height:100%;background:#1f6feb;width:16.67%;border-radius:2px;"></div>
      </div>
      <span id="wizard-step-count" style="color:#8b949e;font-size:11px;white-space:nowrap;">1 of 6</span>
    </div>
  </header>

  <!-- Step Content Area -->
  <div id="wizard-content" style="flex:1;overflow-y:auto;padding:16px;">
    <!-- Content dynamically inserted here -->
  </div>
  <div id="wizard-feedback" style="padding:0 16px 8px;font-size:11px;height:20px;"></div>

  <!-- Success Screen -->
  <div id="wizard-success" style="display:none;flex:1;flex-direction:column;overflow-y:auto;padding:40px 16px;text-align:center;background:#0d1117;animation:fadeIn 0.3s ease;">
    <div id="wizard-success-icon" style="font-size:64px;margin-bottom:24px;">✅</div>
    <h2 style="font-size:24px;font-weight:600;color:#238636;margin:0 0 12px;">Blueprint Created Successfully!</h2>
    <p style="color:#8b949e;font-size:13px;margin:0 0 24px;">Your swarm blueprint is ready to use.</p>

    <div style="background:#161b22;border:1px solid #21262d;border-radius:6px;padding:16px;text-align:left;margin-bottom:24px;font-family:monospace;font-size:11px;max-height:250px;overflow-y:auto;">
      <pre id="wizard-yaml-output" style="margin:0;color:#8b949e;white-space:pre-wrap;word-break:break-word;line-height:1.5;"></pre>
    </div>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button onclick="executeNow()" style="padding:10px 20px;background:#238636;color:#e6edf3;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;transition:all 0.15s;" onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='brightness(1)'">
        Execute Now
      </button>
      <button onclick="editBlueprint()" style="padding:10px 20px;background:#1f6feb;color:#e6edf3;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;transition:all 0.15s;" onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='brightness(1)'">
        Edit & Review
      </button>
      <button onclick="copyToClipboard()" style="padding:10px 20px;background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;transition:all 0.15s;" onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='brightness(1)'">
        Copy YAML
      </button>
    </div>
  </div>

  <!-- Navigation Buttons -->
  <footer id="wizard-footer" style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid #21262d;background:#161b22;flex-shrink:0;">
    <button id="wizard-prev" class="wizard-button" onclick="wizardPrev()" style="flex:0 1 auto;padding:8px 16px;background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;transition:all 0.15s;">
      Previous
    </button>
    <div style="flex:1;"></div>
    <button id="wizard-next" class="wizard-button" onclick="wizardNext()" style="flex:0 1 auto;padding:8px 16px;background:#1f6feb;color:#e6edf3;border:1px solid #1f6feb;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;">
      Next
    </button>
  </footer>

</div>

<script>
  /**
   * Blueprint Wizard - 6-step interactive form
   */

  const STEPS = [
    {
      id: 'name',
      title: 'Blueprint Name',
      subtitle: 'Give your blueprint a concise, descriptive name',
      prompt: 'Enter blueprint name (e.g., "research", "code-review", "debug")',
      placeholder: 'my-swarm-blueprint',
      inputType: 'text',
    },
    {
      id: 'description',
      title: 'Description',
      subtitle: 'What does this blueprint do?',
      prompt: 'Describe the purpose and workflow',
      placeholder: 'Orchestrates parallel agents to...',
      inputType: 'textarea',
    },
    {
      id: 'agents',
      title: 'Define Agents',
      subtitle: 'Specify the agents involved in this blueprint',
      prompt: 'Enter agent names (comma-separated)',
      placeholder: 'agent1, agent2, agent3',
      inputType: 'text',
      hint: 'Examples: searcher, analyst, synthesizer',
    },
    {
      id: 'details',
      title: 'Agent Details',
      subtitle: 'Configure individual agent prompts',
      prompt: 'You can edit agent prompts after the wizard',
      inputType: 'info',
      hint: 'Each agent will have a dedicated prompt field',
    },
    {
      id: 'context',
      title: 'Execution Context',
      subtitle: 'Define the overall task or goal',
      prompt: 'What task will the swarm execute?',
      placeholder: 'Research the latest AI frameworks...',
      inputType: 'textarea',
    },
    {
      id: 'flow',
      title: 'Execution Flow',
      subtitle: 'Define the topology using flow syntax',
      prompt: 'Use arrow (->) for sequential, comma (,) for parallel',
      placeholder: 'agent1, agent2 -> agent3',
      inputType: 'text',
      hint: 'Examples: "A, B -> C", "A -> B -> C", "A, B, C"',
    },
  ];

  let currentStep = 0;
  const formData = {};
  let validationTimeout;

  function validateStep(stepId, value) {
    const rules = {
      name: (v) => v.trim().length >= 2 && v.trim().length <= 50,
      description: (v) => v.trim().length >= 10 && v.trim().length <= 500,
      agents: (v) => v.trim().length > 0,
      details: (v) => true, // info-only step, always valid
      context: (v) => v.trim().length > 0,
      flow: (v) => v.trim().length > 0
    };

    const validator = rules[stepId];
    return validator ? validator(value) : true;
  }

  function updateValidationFeedback(stepId, isValid) {
    const input = document.getElementById('wizard-input');
    const feedback = document.getElementById('wizard-feedback');

    feedback.innerHTML = '';

    if (isValid) {
      input.style.borderColor = '#238636';
      const span = document.createElement('span');
      span.style.color = '#238636';
      span.textContent = '✓ Valid';
      feedback.appendChild(span);
    } else {
      input.style.borderColor = '#f85149';
      const span = document.createElement('span');
      span.style.color = '#f85149';
      span.textContent = '✗ Invalid input';
      feedback.appendChild(span);
    }
  }

  function wizardNext() {
    // Validate current step
    const step = STEPS[currentStep];
    const input = document.getElementById('wizard-input');
    const button = document.getElementById('wizard-next');

    if (input && input.value.trim()) {
      formData[step.id] = input.value.trim();
    }

    // Show processing state
    const originalText = button.textContent;
    button.textContent = 'Processing...';
    button.disabled = true;

    // Transition to next step with smooth fade
    setTimeout(() => {
      if (currentStep < STEPS.length - 1) {
        currentStep++;
        renderStep();
        button.textContent = 'Next';
      } else {
        // Finish wizard
        completeWizard();
        return;
      }
      button.disabled = false;
    }, 300);
  }

  function wizardPrev() {
    if (currentStep > 0) {
      // Save current input
      const step = STEPS[currentStep];
      const input = document.getElementById('wizard-input');
      if (input && input.value.trim()) {
        formData[step.id] = input.value.trim();
      }

      // Transition with smooth fade
      const button = document.getElementById('wizard-prev');
      button.disabled = true;

      setTimeout(() => {
        currentStep--;
        renderStep();
        button.disabled = false;
      }, 300);
    }
  }

  function renderStep() {
    const step = STEPS[currentStep];
    const content = document.getElementById('wizard-content');
    const title = document.getElementById('wizard-title');
    const subtitle = document.getElementById('wizard-subtitle');
    const prevBtn = document.getElementById('wizard-prev');
    const nextBtn = document.getElementById('wizard-next');

    // Update header
    title.textContent = step.title;
    subtitle.textContent = step.subtitle;

    // Update progress bar
    const progress = ((currentStep + 1) / STEPS.length) * 100;
    document.getElementById('wizard-progress-bar').style.width = progress + '%';
    document.getElementById('wizard-step-count').textContent = `${currentStep + 1} of ${STEPS.length}`;

    // Disable/enable prev button
    prevBtn.disabled = currentStep === 0;
    prevBtn.style.opacity = currentStep === 0 ? '0.5' : '1';
    prevBtn.style.cursor = currentStep === 0 ? 'not-allowed' : 'pointer';

    // Update next button text
    nextBtn.textContent = currentStep === STEPS.length - 1 ? 'Create Blueprint' : 'Next';

    // Clear and render content
    content.innerHTML = '';

    // Prompt label
    const promptLabel = document.createElement('label');
    promptLabel.style.cssText = 'display:block;color:#8b949e;font-size:11px;margin-bottom:8px;';
    promptLabel.textContent = step.prompt;
    content.appendChild(promptLabel);

    // Input field (or info message for steps without input)
    if (step.inputType === 'text') {
      const input = document.createElement('input');
      input.id = 'wizard-input';
      input.type = 'text';
      input.placeholder = step.placeholder || '';
      input.value = formData[step.id] || '';
      input.className = 'mock-input';
      input.style.cssText = 'display:block;width:100%;padding:10px 12px;background:#161b22;border:1px solid #21262d;border-radius:4px;color:#e6edf3;font-family:inherit;font-size:11px;margin-bottom:8px;box-sizing:border-box;transition:border-color 0.2s ease;';
      input.addEventListener('keypress', e => {
        if (e.key === 'Enter') wizardNext();
      });
      input.addEventListener('input', (e) => {
        clearTimeout(validationTimeout);
        validationTimeout = setTimeout(() => {
          const isValid = validateStep(step.id, e.target.value);
          updateValidationFeedback(step.id, isValid);
          document.getElementById('wizard-next').disabled = !isValid;
        }, 150);
      });
      content.appendChild(input);

      // Trigger validation on initial load
      const initialValue = input.value;
      const isValid = validateStep(step.id, initialValue);
      if (initialValue) {
        updateValidationFeedback(step.id, isValid);
      }
      document.getElementById('wizard-next').disabled = !isValid;

      input.focus();
    } else if (step.inputType === 'textarea') {
      const textarea = document.createElement('textarea');
      textarea.id = 'wizard-input';
      textarea.placeholder = step.placeholder || '';
      textarea.value = formData[step.id] || '';
      textarea.className = 'mock-input';
      textarea.style.cssText = 'display:block;width:100%;height:120px;padding:10px 12px;background:#161b22;border:1px solid #21262d;border-radius:4px;color:#e6edf3;font-family:inherit;font-size:11px;margin-bottom:8px;box-sizing:border-box;resize:vertical;transition:border-color 0.2s ease;';
      textarea.addEventListener('input', (e) => {
        clearTimeout(validationTimeout);
        validationTimeout = setTimeout(() => {
          const isValid = validateStep(step.id, e.target.value);
          updateValidationFeedback(step.id, isValid);
          document.getElementById('wizard-next').disabled = !isValid;
        }, 150);
      });
      content.appendChild(textarea);

      // Trigger validation on initial load
      const initialValue = textarea.value;
      const isValid = validateStep(step.id, initialValue);
      if (initialValue) {
        updateValidationFeedback(step.id, isValid);
      }
      document.getElementById('wizard-next').disabled = !isValid;

      textarea.focus();
    } else if (step.inputType === 'info') {
      const infoBox = document.createElement('div');
      infoBox.style.cssText = 'background:#161b22;border:1px solid #21262d;border-radius:4px;padding:12px;margin-bottom:8px;color:#8b949e;font-size:11px;line-height:1.6;';
      infoBox.textContent = step.hint || 'Configuration information will be gathered in the next steps.';
      content.appendChild(infoBox);

      // Info steps are always valid
      nextBtn.disabled = false;
      const feedback = document.getElementById('wizard-feedback');
      feedback.innerHTML = '';
    }

    // Hint text
    if (step.hint) {
      const hint = document.createElement('p');
      hint.style.cssText = 'font-size:10px;color:#484f58;margin-top:8px;margin-bottom:0;';
      hint.textContent = step.hint;
      content.appendChild(hint);
    }
  }

  function completeWizard() {
    console.log('Blueprint wizard complete:', formData);

    // In real integration: POST to /blueprints or trigger creation
    if (window.parent && window.parent.postMessage) {
      window.parent.postMessage({
        type: 'wizard_complete',
        blueprint: formData,
      }, '*');
    }

    showSuccessScreen();
  }

  function showSuccessScreen() {
    const yaml = generateYAML();
    const yamlDiv = document.getElementById('wizard-yaml-output');
    if (yamlDiv) {
      yamlDiv.textContent = yaml;
    }

    document.getElementById('wizard-content').style.display = 'none';
    document.getElementById('wizard-footer').style.display = 'none';
    document.getElementById('wizard-success').style.display = 'flex';
  }

  function generateYAML() {
    let yaml = 'name: ' + (formData.name || 'my-blueprint') + '\n';
    yaml += 'description: "' + (formData.description || '') + '"\n';
    yaml += 'flow: "' + (formData.flow || '') + '"\n';
    yaml += 'agents:\n';

    if (formData.agents) {
      const agents = formData.agents.split(',').map(a => a.trim()).filter(a => a);
      agents.forEach(name => {
        yaml += '  ' + name + ':\n';
        yaml += '    prompt: "Agent ' + name + ' prompt"\n';
      });
    }

    return yaml;
  }

  function executeNow() {
    const yaml = generateYAML();
    console.log('Execute swarm now with YAML:', yaml);
    alert('Execute Now - This would trigger: /swarm ' + formData.name);
  }

  function editBlueprint() {
    console.log('Edit blueprint');
    alert('Edit & Review - Open blueprint editor');
  }

  function copyToClipboard() {
    const yaml = generateYAML();
    navigator.clipboard.writeText(yaml).then(() => {
      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = 'Copied!';
      btn.style.color = '#238636';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.color = '#8b949e';
      }, 2000);
    }).catch(() => {
      alert('Failed to copy to clipboard');
    });
  }

  // Initialize
  renderStep();
</script>
